<!DOCTYPE html>
<html>
<head>
    <title>form</title>
</head>
<body style="background-color: cornsilk;">

<form>
<table border="3px" align="center" style="background-color: cornsilk;">

<tr>
    <td><label for="fullname">Full Name:</label></td>
    <td><input type="text" id="fullname" placeholder="Enter your Full name"></td>
</tr>

<tr>
    <td><label for="email">Email:</label></td>
    <td><input type="email" id="email" placeholder="Enter your e-mail"></td>
</tr>

<tr>
    <td><label for="phone">Phone Number:</label></td>
    <td><input type="text" id="phone" placeholder="Enter your phone number"></td>
</tr>

<tr>
    <td>Gender:</td>
    <td>
        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>

        <input type="radio" name="gender" id="female">
        <label for="female">Female</label>
    </td>
</tr>

<tr>
    <td><label for="course">Course applying for:</label></td>
    <td>
        <select id="course">
            <option>B.Tech</option>
            <option>M.Tech</option>
            <option>MBA</option>
            <option>M.Sc</option>
        </select>
    </td>
</tr>

<tr>
    <td>Hobbies:</td>
    <td>
        <input type="checkbox" id="sports">
        <label for="sports">Sports</label>

        <input type="checkbox" id="music">
        <label for="music">Music</label>

        <input type="checkbox" id="reading">
        <label for="reading">Reading</label>
    </td>
</tr>

<tr>
    <td><label for="dob">Date of Birth:</label></td>
    <td><input type="date" id="dob"></td>
</tr>

<tr>
    <td><label for="certificates">Upload your Certificates:</label></td>
    <td><input type="file" id="certificates"></td>
</tr>

<tr>
    <td><label for="address">Address:</label></td>
    <td>
        <textarea id="address" rows="3" cols="25" placeholder="Enter your Address"></textarea>
    </td>
</tr>

<tr>
    <td colspan="2" align="center">
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </td>
</tr>

</table>
</form>

</body>
</html>
